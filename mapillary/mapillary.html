<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Köppen-Guessr | Mapillary Mode</title>
    <!-- Mapillary JS -->
    <link href='https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css' rel='stylesheet' />
    <script src='https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js'></script>
    <link rel="stylesheet" href="../streaks/streaks.css">
    <link rel="stylesheet" href="mapillary.css">
</head>

<body>
    <div id="game-container">
        <header>
            <div style="display:flex; align-items:center;">
                <a href="../index.html" class="home-link">← Home</a>
                <h1>Images</h1>
            </div>
            <div id="stats">
                <span id="streak-label">TOTAL SCORE</span>
                <span id="streak-value">0</span>
            </div>
        </header>

        <main>
            <!-- Mapillary Viewer -->
            <div id="mly-container" class="card">
                <div id="mly"></div>
                <div id="mly-overlay" class="hidden">
                    <div class="spinner"></div>
                    <p>Finding imagery...</p>
                </div>
            </div>

            <div class="card">
                <div id="game-area">
                    <p class="instruction">What is the Köppen-Geiger climate zone for this location?</p>

                    <div id="guess-input-container">
                        <input type="text" id="guess-search" placeholder="Search climate zone (e.g. Af, Cfb, Desert)..."
                            autocomplete="off">
                        <div id="dropdown-options" class="hidden"></div>
                    </div>

                    <div id="feedback" class="hidden">
                        <p id="feedback-message"></p>
                        <p id="feedback-details"></p>
                        <button id="next-btn" class="hidden">Next Location</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="token-notice" class="card" style="margin-top: 20px; font-size: 0.8rem; opacity: 0.8;">
            <p><strong>Note:</strong> Mapillary mode requires a Client Token. 
            <input type="password" id="api-token-input" placeholder="Enter Mapillary Client Token..." style="width: 100%; margin-top: 10px; padding: 5px; background: #252525; border: 1px solid #333; color: white; border-radius: 4px;">
            </p>
        </div>

        <footer>
            <p>Data: <a href="https://simplemaps.com/data/world-cities">worldcities</a> & Mapillary | Styled by Antigravity</p>
        </footer>
    </div>

    <script src="mapillary.js"></script>
</body>

</html>
