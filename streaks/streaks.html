<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KöppenGuessr | Streaks</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <!-- Scripts: PapaParse (CSV) and netcdfjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/netcdfjs@0.10.0/dist/netcdfjs.min.js"></script>
    <link rel="stylesheet" href="streaks.css">
    <style>
        .home-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }


    </style>
</head>

<body>
    <div id="game-container">
        <header>
            <div style="display:flex; align-items:center;">
                <a href="../index.html" class="home-link">← Home</a>
                <h1 style="margin-left: 20px; font-weight: 800; letter-spacing: -1px;">Streaks</h1>
            </div>
            <div id="stats">
                <span id="streak-label">STREAK</span>
                <span id="streak-value">0</span>
            </div>
        </header>

        <main>
            <div id="city-card" class="card">
                <div id="city-info">
                    <h2 id="city-name">Loading...</h2>
                    <h3 id="country-info">
                        <span id="flag-emoji"></span>
                        <span id="admin-country"></span>
                    </h3>
                </div>
                <div id="game-area">
                    <p style="color:var(--text-secondary); font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom: 2px;">Identify the Climate</p>

                    <div id="guess-input-container">
                        <input type="text" id="guess-search" placeholder="Search climate zone (e.g. Af, Cfb, Desert)..."
                            autocomplete="off">
                        <div id="dropdown-options" class="hidden"></div>
                    </div>
                </div>
            </div>
        </main>

        <div id="feedback-overlay" class="hidden">
            <div id="modal">
                <h2 id="feedback-message" style="font-size: 1.8rem; margin-bottom: 20px;"></h2>
                <div id="feedback-details" style="margin-bottom: 30px;"></div>
                <button id="next-btn" class="modal-btn" style="width:100%; background:#222; border:1px solid #333; color:#fff; padding:15px; border-radius:30px; font-weight:700; cursor:pointer;">Next City</button>
            </div>
        </div>


    </div>

    <script src="streaks.js"></script>
</body>

</html>
