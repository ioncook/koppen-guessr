<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Köppen-Guessr | Climate Zone Master</title>
    <!-- Scripts: PapaParse (CSV) and netcdfjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/netcdfjs@0.10.0/dist/netcdfjs.min.js"></script>
    <link rel="stylesheet" href="streaks.css">
    <style>
        .home-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 700;
            margin-right: 20px;
            transition: color 0.2s;
        }
        .home-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <div id="game-container">
        <header>
            <div style="display:flex; align-items:center;">
                <a href="../index.html" class="home-link">← Home</a>
                <h1>Streaks</h1>
            </div>
            <div id="stats">
                <span id="streak-label">STREAK</span>
                <span id="streak-value">0</span>
            </div>
        </header>

        <main>
            <div id="city-card" class="card">
                <div id="city-info">
                    <h2 id="city-name">Loading...</h2>
                    <h3 id="country-info">
                        <span id="flag-emoji"></span>
                        <span id="admin-country"></span>
                    </h3>
                </div>
                <div id="game-area">
                    <p class="instruction">What is the Köppen-Geiger climate zone for this city?</p>

                    <div id="guess-input-container">
                        <input type="text" id="guess-search" placeholder="Search climate zone (e.g. Af, Cfb, Desert)..."
                            autocomplete="off">
                        <div id="dropdown-options" class="hidden"></div>
                    </div>

                    <div id="feedback" class="hidden">
                        <p id="feedback-message"></p>
                        <p id="feedback-details"></p>
                        <button id="next-btn" class="hidden">Next City</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Data: <a href="https://simplemaps.com/data/world-cities">worldcities</a> & <a
                    href="https://www.nature.com/articles/s41597-023-02549-6">Beck et al. (2023)</a> | Styled by
                Antigravity</p>
        </footer>
    </div>

    <script src="streaks.js"></script>
</body>

</html>
