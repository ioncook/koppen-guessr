<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Guessr - Images</title>
    <link rel="stylesheet" href="../streaks/streaks.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #ababab;
            --card-bg: #141414;
            --border-color: #1f1f1f;
            --text-secondary: #777;
            --text-color: #e0e0e0;
        }

        #image-container {
            width: 100%;
            height: 380px;
            background-color: #000;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 25px;
            position: relative;
            border: 1px solid #222;
        }

        #load-curtain {
            position: absolute;
            inset: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #111;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .home-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #feedback-overlay.hidden { display: none; }

        #dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #modal {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .unit-toggle-small {
            display: flex;
            gap: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            margin-top: 10px;
            justify-content: center;
        }
        .unit-toggle-small .active { color: var(--accent-color); }

        #stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        #guess-input-container {
            position: relative;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <header>
            <div style="display:flex; align-items:center;">
                <a href="../index.html" class="home-link">← Home</a>
                <h1 style="margin-left: 20px; font-weight: 800; letter-spacing: -1px;">Images</h1>
            </div>
            <div id="stats">
                <span id="streak-label" style="letter-spacing: 2px;">ROUND DISTANCE</span>
                <span id="session-score">0 KM</span>
            </div>
        </header>

        <main>
            <div class="card">
                <div id="image-container">
                    <div id="load-curtain">
                        <div class="spinner"></div>
                        <p style="color:var(--text-secondary); font-size: 0.8rem;">Retrieving location imagery...</p>
                    </div>
                </div>

                <p style="color:var(--text-secondary); font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom: 2px;">Identify the Climate</p>
                
                <div id="guess-input-container">
                    <input type="text" id="legend-search" placeholder="Search climate zone (e.g. Af, Desert, Tundra)..." autocomplete="off">
                    <div id="dropdown" class="hidden"></div>
                </div>

                <div id="stats-row" style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span id="round-indicator" style="font-size:0.75rem; font-weight:900; color:var(--text-secondary); letter-spacing: 0.5px;">ROUND 1/5</span>
                    <div id="unit-toggle" class="unit-toggle-small">
                        <span id="unit-metric" class="active">METRIC</span>
                        <span style="color:#222">|</span>
                        <span id="unit-imperial">IMPERIAL</span>
                    </div>
                </div>
            </div>
        </main>

        <div id="feedback-overlay" class="hidden">
            <div id="modal">
                <h2 id="modal-title" style="font-size: 1.8rem; margin-bottom: 20px;"></h2>
                <div id="modal-details" style="margin-bottom: 30px;"></div>
                <button id="modal-btn" class="modal-btn" style="width:100%; background:#222; border:1px solid #333; color:#fff; padding:15px; border-radius:30px; font-weight:700; cursor:pointer;">Continue</button>
            </div>
        </div>
    </div>

    <script src="images.js"></script>
</body>
</html>
